[application]
name = "Hemion"
default_platform = "desktop"
asset_dir = "public"
tailwind_input = "public/tailwind.css"
tailwind_output = "assets/tailwind.css"

# Desktop is the primary distribution target. The web/WASM configuration below
# remains available for a later `dx --web` build.
[bundle]
identifier = "io.hemion.wallet"
publisher = "Amin Razavi"
category = "Finance"
short_description = "A standalone multi-chain Parwana wallet"
long_description = "Hemion is a standalone multi-chain wallet for managing Parwanaaccounts, sanads, seals, and encrypted wallet backups."

[web.app]
title = "Hemion"
base_path = "/"

[web.watcher]
port = 8181
watch_path = ["src", "public"]

[web.resource]

[web.resource.dev]
style = ["assets/tailwind.css"]

[web.resource.build]
style = ["assets/tailwind.css"]

[wasm]
opt-level = 2
