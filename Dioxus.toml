[application]
name = "Hemion"
default_platform = "desktop"
asset_dir = "public"
tailwind_input = "public/tailwind.css"
tailwind_output = "assets/tailwind.css"

# Desktop is the primary distribution target. The web/WASM configuration below
# remains available for a later `dx --web` build.
[bundle]
identifier = "io.diewan.hemion"
publisher = "Amin Razavi"
category = "DeveloperTool"
short_description = "Local Parwana developer console"
long_description = "Hemion is the local-first Parwana developer console. It keeps the legacy multi-chain wallet available as a separate tool area."

[web.app]
title = "Hemion"
base_path = "/"

[web.watcher]
port = 8181
watch_path = ["src", "public"]

[web.resource]

[web.resource.dev]
style = ["assets/tailwind.css"]

[web.resource.build]
style = ["assets/tailwind.css"]

[wasm]
opt-level = 2
